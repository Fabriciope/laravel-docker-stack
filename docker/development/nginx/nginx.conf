server {
    listen 80;
    listen [::]:80;
    server_name _;

    server_tokens off;

    root /var/www/public;
    index index.php;
    charset utf-8;

    access_log /var/www/storage/logs/nginx/access.log;
    error_log /var/www/storage/logs/nginx/error.log;

    sendfile on;

    client_max_body_size 50M;
    client_body_buffer_size 128k;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    error_page 404 /index.php;
    error_page 413 /error/413;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Em desenvolvimento: bloqueia somente /logs (texto plano sensível).
    # /_debugbar é liberado para o Laravel Debugbar funcionar.
    location ~ ^/logs {
        access_log off;
        return 404;
    }

    location ~ ^/\.well-known {
        access_log off;
        allow all;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include /etc/nginx/fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }
}
