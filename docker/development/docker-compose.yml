# =============================================================================
# Projeto {{project-name}} - Nginx + PHP-FPM integrado com Traefik (desenvolvimento)
# Acesso: http://{{project-name}}.local
#         http://{{project-name}}-mailpit.local  (Web UI do Mailpit)
# =============================================================================
# Pré-requisitos:
#   1. Traefik de desenvolvimento rodando com a rede proxy-network
#      (ver repositório traefik-setup, pasta development/)
#      cd /path/to/traefik && docker compose -f development/docker-compose.yml up -d
#   2. Entradas no /etc/hosts:
#        127.0.0.1 {{project-name}}.local
#        127.0.0.1 {{project-name}}-mailpit.local
#   3. .env configurado para Docker (DB_HOST=db, REDIS_HOST=redis, APP_URL=http://{{project-name}}.local)
# =============================================================================
# Primeiro deploy:
#   ./scripts/deploy dev --first-deploy
#
# Deploy normal:
#   ./scripts/deploy dev
# =============================================================================

services:
    web-server:
        container_name: "{{project-name}}-web-server_dev"

        build:
            context: ./../..
            dockerfile: docker/development/nginx/Dockerfile

        image: "{{project-name}}-web-server:1.0.0-dev"

        restart: unless-stopped

        environment:
            TZ: America/Sao_Paulo

        volumes:
            - ./../../public:/var/www/public:ro
            - ./../../storage/app/public:/var/www/storage/app/public:ro
            - ./../../storage/logs/nginx:/var/www/storage/logs/nginx:rw

        expose:
            - "80"

        networks:
            - proxy-network
            - project-network

        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

        depends_on:
            php-fpm:
                condition: service_healthy

        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 20s

        labels:
            - "traefik.enable=true"

            # Roteador HTTP (sem TLS em desenvolvimento)
            - "traefik.http.routers.{{project-name}}-dev.rule=Host(`{{project-name}}.local`)"
            - "traefik.http.routers.{{project-name}}-dev.entrypoints=web"

            # Porta interna que o Traefik usa para alcançar o Nginx
            - "traefik.http.services.{{project-name}}-dev.loadbalancer.server.port=80"

            # Garante que o Traefik use a rede correta (proxy-network)
            - "traefik.docker.network=proxy-network"

            # Metadados do container
            - "com.{{project-name}}.project={{project-name}}"
            - "com.{{project-name}}.service=web-server"
            - "com.{{project-name}}.environment=development"
    php-fpm:
        container_name: "{{project-name}}-php-fpm_dev"

        # Metadados do container
        labels:
            - "com.{{project-name}}.project={{project-name}}"
            - "com.{{project-name}}.service=php-fpm"
            - "com.{{project-name}}.environment=development"
        build:
            context: ./../..
            dockerfile: docker/development/php-fpm/Dockerfile

        image: "{{project-name}}-php-fpm:1.0.0-dev"

        restart: unless-stopped

        environment:
            TZ: America/Sao_Paulo

        volumes:
            - ./../../:/var/www

        networks:
            - project-network

        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy

        healthcheck:
            test: ["CMD-SHELL", "cgi-fcgi -bind -connect 127.0.0.1:9000"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s

        # Permite que o Xdebug no container alcance o IDE no host
        extra_hosts:
            - "host.docker.internal:host-gateway"

    horizon:
        container_name: "{{project-name}}-horizon_dev"

        # Metadados do container
        labels:
            - "com.{{project-name}}.project={{project-name}}"
            - "com.{{project-name}}.service=horizon"
            - "com.{{project-name}}.environment=development"
        build:
            context: ./../..
            dockerfile: docker/development/php-fpm/Dockerfile

        image: "{{project-name}}-horizon:1.0.0-dev"

        restart: unless-stopped

        environment:
            TZ: America/Sao_Paulo

        volumes:
            - ./../../:/var/www

        networks:
            - project-network

        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

        command: php artisan horizon

        depends_on:
            redis:
                condition: service_healthy
            db:
                condition: service_healthy

        healthcheck:
            test: ["CMD", "php", "artisan", "horizon:status"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s

    scheduler:
        container_name: "{{project-name}}-scheduler_dev"

        # Metadados do container
        labels:
            - "com.{{project-name}}.project={{project-name}}"
            - "com.{{project-name}}.service=scheduler"
            - "com.{{project-name}}.environment=development"
        build:
            context: ./../..
            dockerfile: docker/development/php-fpm/Dockerfile

        image: "{{project-name}}-scheduler:1.0.0-dev"

        restart: unless-stopped

        environment:
            TZ: America/Sao_Paulo

        volumes:
            - ./../../:/var/www

        networks:
            - project-network

        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

        command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"

        depends_on:
            redis:
                condition: service_healthy
            db:
                condition: service_healthy

        healthcheck:
            test: ["CMD", "php", "-r", "echo 'ok';"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 20s

    # ---------------------------------------------------------------------------
    # Vite dev server (opcional — HMR dentro do Docker)
    #
    # Prefira rodar no host: `npm run build` (uma vez) ou `npm run dev` (HMR).
    # Só adicione este serviço se quiser tudo containerizado.
    #
    # Para ativar, descomente e adicione `vite` ao depends_on do web-server:
    #
    # vite:
    #     container_name: {{project-name}}-vite_dev
    #     image: node:20-alpine
    #     working_dir: /app
    #     environment:
    #         VITE_HOST: "0.0.0.0"
    #         VITE_HMR_HOST: "localhost"
    #     command: sh -c "npm ci && npm run dev"
    #     volumes:
    #         - ./../../:/app
    #     ports:
    #         - "127.0.0.1:5173:5173"
    #     networks:
    #         - project-network
    # ---------------------------------------------------------------------------

    db:
        image: mysql:8.4.3

        container_name: "{{project-name}}-database_dev"

        # Metadados do container
        labels:
            - "com.{{project-name}}.project={{project-name}}"
            - "com.{{project-name}}.service=db"
            - "com.{{project-name}}.environment=development"
        restart: unless-stopped

        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            TZ: America/Sao_Paulo

        volumes:
            - db-data:/var/lib/mysql

        networks:
            - project-network

        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

        ports:
            # Porta diferente de produção (3307) para evitar conflito
            - "127.0.0.1:3308:3306"

        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=${DB_ROOT_PASSWORD}"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 40s

    # TODO: tambem adaptar o redis-insight
    redis:
        image: redis:8.2.1

        container_name: "{{project-name}}-redis_dev"

        # Metadados do container
        labels:
            - "com.{{project-name}}.project={{project-name}}"
            - "com.{{project-name}}.service=redis"
            - "com.{{project-name}}.environment=development"
        command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 100mb --maxmemory-policy allkeys-lru

        restart: unless-stopped

        environment:
            TZ: America/Sao_Paulo

        volumes:
            - redis-data:/data

        networks:
            - project-network

        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

        ports:
            # Porta diferente de produção (6380) para evitar conflito
            - "127.0.0.1:6381:6379"

        healthcheck:
            test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 20s

    mailpit:
        image: axllent/mailpit

        container_name: "{{project-name}}-mailpit_dev"

        restart: unless-stopped

        environment:
            TZ: America/Sao_Paulo
            MP_MAX_MESSAGES: 5000
            MP_DATABASE: /data/mailpit.db
            MP_SMTP_AUTH_ACCEPT_ANY: 1
            MP_SMTP_AUTH_ALLOW_INSECURE: 1

        volumes:
            - mailpit-data:/data

        networks:
            - proxy-network
            - project-network

        logging:
            driver: "json-file"
            options:
                max-size: "5m"
                max-file: "2"

        # Web UI exposta via Traefik em http://{{project-name}}-mailpit.local
        # SMTP (1025) fica apenas na project-network — só o php-fpm precisa.
        expose:
            - "8025"

        labels:
            - "traefik.enable=true"

            - "traefik.http.routers.{{project-name}}-mailpit-dev.rule=Host(`{{project-name}}-mailpit.local`)"
            - "traefik.http.routers.{{project-name}}-mailpit-dev.entrypoints=web"

            - "traefik.http.services.{{project-name}}-mailpit-dev.loadbalancer.server.port=8025"

            - "traefik.docker.network=proxy-network"

            # Metadados do container
            - "com.{{project-name}}.project={{project-name}}"
            - "com.{{project-name}}.service=mailpit"
            - "com.{{project-name}}.environment=development"
volumes:
    # Volumes locais (não externos): descartáveis com `docker compose down -v`
    db-data:
    redis-data:
    mailpit-data:

networks:
    project-network:

    proxy-network:
        external: true
