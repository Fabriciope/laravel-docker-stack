memory_limit = 256M
upload_max_filesize = 20M
post_max_size = 21M
max_execution_time = 60

; Revalida bytecode a cada 2s para refletir mudanças de código sem reiniciar o container
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 2
opcache.validate_timestamps = 1
opcache.save_comments = 1

; Exibe erros na resposta (complementa php.ini-development)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

error_log = /var/www/storage/logs/php-fpm/www.app.log
log_errors = On

; Xdebug — conecta ao IDE na porta 9003 (padrão Xdebug 3)
; host.docker.internal resolve para o IP do host via extra_hosts no docker-compose
xdebug.mode = develop
xdebug.start_with_request = yes
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.idekey = VSCODE
xdebug.output_dir = /var/www/storage/logs/php-fpm
xdebug.log = /var/www/storage/logs/php-fpm/xdebug.log

date.timezone = America/Sao_Paulo
