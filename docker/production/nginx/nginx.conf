server {
    listen 80;
    listen [::]:80;
    server_name _;

    server_tokens off;

    root /var/www/public;
    index index.php;
    charset utf-8;

    access_log /var/www/storage/logs/nginx/access.log;
    error_log /var/www/storage/logs/nginx/error.log;

    sendfile on;

   # Indicated by the request header Content-Length. If the stated content length is greater than this size,
   # then the client receives the HTTP error code 413. Set to 0 to disable. Default is '1m'.
    client_max_body_size 11M;
    client_body_buffer_size 128k;   # buffer in-memory; corpos maiores vão pra disk temp

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    error_page 404 /index.php;
    error_page 413 /error/413;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/(logs|_debugbar) {
        access_log off;
        return 404;
    }

    location ~ ^/\.well-known {
        access_log off;
        allow all;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        # Garante que o header Authorization chegue ao PHP (Basic Auth do /log-viewer).
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        include /etc/nginx/fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }
}
